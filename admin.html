<!doctype html>
<html lang="af">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RSVP Administrasie | Divan & Kristin</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=20260604">
  </head>
  <body>
    <header class="site-header">
      <a class="monogram" href="/" aria-label="Back to wedding website">D <span>&amp;</span> K</a>
      <nav class="site-nav admin-nav" aria-label="Admin navigation">
        <a href="/">Website</a>
      </nav>
    </header>

    <main>
      <section class="section-shell admin-section" aria-labelledby="admin-title">
        <p class="kicker">Privaat oorsig</p>
        <h1 id="admin-title">RSVP Administrasie</h1>

        <form class="admin-login">
          <label>
            Admin wagwoord
            <span class="password-field">
              <input id="admin-password" type="password" name="password" autocomplete="current-password" required>
              <button class="password-toggle" type="button" aria-label="Wys wagwoord" aria-pressed="false" data-password-toggle data-target="admin-password">Wys</button>
            </span>
          </label>
          <button class="pill-button" type="submit">Laai RSVP's</button>
          <p class="form-status" role="status" aria-live="polite"></p>
        </form>

        <div class="admin-summary" hidden>
          <article>
            <strong data-summary="total">0</strong>
            <span>Totale antwoorde</span>
          </article>
          <article>
            <strong data-summary="attending">0</strong>
            <span>Bywoon</span>
          </article>
          <article>
            <strong data-summary="declined">0</strong>
            <span>Bedank</span>
          </article>
        </div>

        <div class="admin-table-wrap" hidden>
          <table class="admin-table">
            <thead>
              <tr>
                <th>Datum</th>
                <th>Naam</th>
                <th>Bywoning</th>
                <th>Maaltyd</th>
                <th>Kontak</th>
                <th>Dieet</th>
                <th>Boodskap</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const loginForm = document.querySelector(".admin-login");
      const statusText = loginForm.querySelector(".form-status");
      const summary = document.querySelector(".admin-summary");
      const tableWrap = document.querySelector(".admin-table-wrap");
      const tableBody = document.querySelector(".admin-table tbody");
      const passwordToggle = document.querySelector("[data-password-toggle]");
      const passwordInput = document.getElementById(passwordToggle.dataset.target);

      passwordToggle.addEventListener("click", () => {
        const isVisible = passwordInput.type === "text";
        passwordInput.type = isVisible ? "password" : "text";
        passwordToggle.textContent = isVisible ? "Wys" : "Verberg";
        passwordToggle.setAttribute("aria-label", isVisible ? "Wys wagwoord" : "Verberg wagwoord");
        passwordToggle.setAttribute("aria-pressed", String(!isVisible));
      });

      const formatDate = (value) => {
        if (!value) return "";
        return new Intl.DateTimeFormat("en-ZA", {
          dateStyle: "medium",
          timeStyle: "short",
        }).format(new Date(value));
      };

      const setSummary = (submissions) => {
        const attending = submissions.filter((item) =>
          String(item.attending || "").toLowerCase().includes("accept")
        ).length;

        document.querySelector('[data-summary="total"]').textContent = submissions.length;
        document.querySelector('[data-summary="attending"]').textContent = attending;
        document.querySelector('[data-summary="declined"]').textContent = submissions.length - attending;
      };

      const renderRows = (submissions) => {
        tableBody.innerHTML = "";

        submissions.forEach((submission) => {
          const row = document.createElement("tr");
          [
            formatDate(submission.submittedAt),
            submission.name,
            submission.attending,
            submission.meal,
            submission.contact,
            submission.dietary,
            submission.message,
          ].forEach((value) => {
            const cell = document.createElement("td");
            cell.textContent = value || "";
            row.appendChild(cell);
          });
          tableBody.appendChild(row);
        });
      };

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        const password = new FormData(loginForm).get("password");
        const button = loginForm.querySelector("button");
        button.disabled = true;
        statusText.textContent = "RSVP's word gelaai...";

        try {
          const response = await fetch("/api/rsvps", {
            headers: {
              "x-admin-password": password,
            },
          });
          const payload = await response.json();

          if (!response.ok) {
            throw new Error(payload.error || "Kon nie RSVP's laai nie.");
          }

          setSummary(payload.submissions);
          renderRows(payload.submissions);
          summary.hidden = false;
          tableWrap.hidden = false;
          statusText.textContent = payload.submissions.length
            ? "RSVP's gelaai."
            : "Geen RSVP's is nog ingedien nie.";
        } catch (error) {
          summary.hidden = true;
          tableWrap.hidden = true;
          statusText.textContent = error.message;
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
